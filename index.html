<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEPO138 - Proses</title>
<script>document.addEventListener("keydown",function(e){if(123===e.keyCode||e.ctrlKey&&e.shiftKey&&("I"===e.key||"i"===e.key)||e.ctrlKey&&("U"===e.key||"u"===e.key))return e.preventDefault(),!1}),document.addEventListener("contextmenu",function(e){e.preventDefault()});</script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #050508;
    font-family: 'Inter', sans-serif;
    color: #fff;
    text-align: center;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* === Animated Background === */
  .bg-grid {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(255, 179, 0, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 179, 0, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  .bg-glow-1 {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 179, 0, 0.08) 0%, transparent 70%);
    top: -200px;
    left: -200px;
    animation: floatGlow1 8s ease-in-out infinite;
    z-index: 0;
  }

  .bg-glow-2 {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(220, 38, 38, 0.06) 0%, transparent 70%);
    bottom: -150px;
    right: -150px;
    animation: floatGlow2 10s ease-in-out infinite;
    z-index: 0;
  }

  .bg-glow-3 {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: pulseGlow 4s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes floatGlow1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(80px, 60px) scale(1.2); }
  }

  @keyframes floatGlow2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-60px, -40px) scale(1.15); }
  }

  @keyframes pulseGlow {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
  }

  /* === Particles Canvas === */
  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* === Main Content === */
  .content-wrapper {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  /* === Logo === */
  .logo-container {
    position: relative;
    animation: logoFloat 3s ease-in-out infinite;
  }

  .logo-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 179, 0, 0.15) 0%, transparent 70%);
    animation: logoGlowPulse 2.5s ease-in-out infinite;
  }

  .logo-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: 1px solid rgba(255, 179, 0, 0.15);
    animation: ringPulse 3s ease-in-out infinite;
  }

  .logo-ring-2 {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 1px dashed rgba(255, 179, 0, 0.08);
    animation: rotateSlow 20s linear infinite;
  }

  .logo-img {
    width: 140px;
    height: auto;
    position: relative;
    filter: drop-shadow(0 0 20px rgba(255, 179, 0, 0.3));
    transition: filter 0.3s;
  }

  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  @keyframes logoGlowPulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  }

  @keyframes ringPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
    50% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
  }

  @keyframes rotateSlow {
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* === Loader === */
  .loader-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .loader-container {
    position: relative;
    width: 160px;
    height: 160px;
  }

  .outer-ring {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 3px solid transparent;
    border-top-color: #FFB300;
    border-right-color: rgba(255, 179, 0, 0.3);
    animation: spinOuter 1.8s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite;
    filter: drop-shadow(0 0 8px rgba(255, 179, 0, 0.4));
  }

  .middle-ring {
    position: absolute;
    top: 12px; left: 12px;
    width: calc(100% - 24px);
    height: calc(100% - 24px);
    border-radius: 50%;
    border: 2px solid transparent;
    border-bottom-color: #FF3D00;
    border-left-color: rgba(255, 61, 0, 0.3);
    animation: spinInner 1.4s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite reverse;
    filter: drop-shadow(0 0 6px rgba(255, 61, 0, 0.3));
  }

  .inner-ring {
    position: absolute;
    top: 24px; left: 24px;
    width: calc(100% - 48px);
    height: calc(100% - 48px);
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: #FFD54F;
    border-right-color: rgba(255, 213, 79, 0.2);
    animation: spinOuter 1s linear infinite;
    filter: drop-shadow(0 0 4px rgba(255, 213, 79, 0.3));
  }

  .progress-track {
    position: absolute;
    top: 35px; left: 35px;
    width: calc(100% - 70px);
    height: calc(100% - 70px);
    border-radius: 50%;
  }

  .progress-fill {
    fill: none;
    stroke: url(#goldGradient);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 314;
    stroke-dashoffset: 314;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 0.1s ease;
    filter: drop-shadow(0 0 4px rgba(255, 179, 0, 0.5));
  }

  .percentage {
    font-family: 'Orbitron', monospace;
    font-size: 1.8em;
    font-weight: 700;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(135deg, #FFD54F, #FFB300, #FF8F00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  @keyframes spinOuter {
    to { transform: rotate(360deg); }
  }

  @keyframes spinInner {
    to { transform: rotate(360deg); }
  }

  /* === Progress Bar === */
  .progress-bar-container {
    width: 300px;
    max-width: 80vw;
  }

  .progress-bar-track {
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 999px;
    background: linear-gradient(90deg, #FF8F00, #FFB300, #FFD54F);
    box-shadow: 0 0 12px rgba(255, 179, 0, 0.5);
    transition: width 0.1s ease;
    position: relative;
  }

  .progress-bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    background: #FFD54F;
    border-radius: 50%;
    box-shadow: 0 0 10px #FFB300, 0 0 20px rgba(255, 179, 0, 0.4);
  }

  .loading-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.65em;
    letter-spacing: 4px;
    color: rgba(255, 179, 0, 0.5);
    margin-top: 10px;
    text-transform: uppercase;
  }

  /* === Text Section === */
  .text-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .brand-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.7em;
    letter-spacing: 8px;
    color: rgba(255, 179, 0, 0.4);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .waiting-text {
    font-family: 'Inter', sans-serif;
    font-size: 1.3em;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.5px;
  }

  .waiting-text span {
    background: linear-gradient(135deg, #FFD54F, #FFB300);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .redirect-text {
    font-size: 0.85em;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.45);
    max-width: 360px;
    line-height: 1.6;
    position: relative;
    padding: 0 20px;
  }

  .redirect-text .highlight {
    color: #FFB300;
    font-weight: 600;
  }

  /* === Shimmer Dots === */
  .shimmer-dots {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }

  .shimmer-dots .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #FFB300;
    animation: shimmer 1.4s ease-in-out infinite;
  }

  .shimmer-dots .dot:nth-child(2) { animation-delay: 0.2s; }
  .shimmer-dots .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes shimmer {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.2); }
  }

  /* === Bottom Decorative === */
  .bottom-line {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #FFB300, transparent);
    opacity: 0.3;
    z-index: 10;
  }

  .corner-accent {
    position: fixed;
    width: 60px;
    height: 60px;
    z-index: 10;
    opacity: 0.15;
  }

  .corner-accent.tl {
    top: 20px; left: 20px;
    border-top: 2px solid #FFB300;
    border-left: 2px solid #FFB300;
  }

  .corner-accent.tr {
    top: 20px; right: 20px;
    border-top: 2px solid #FFB300;
    border-right: 2px solid #FFB300;
  }

  .corner-accent.bl {
    bottom: 20px; left: 20px;
    border-bottom: 2px solid #FFB300;
    border-left: 2px solid #FFB300;
  }

  .corner-accent.br {
    bottom: 20px; right: 20px;
    border-bottom: 2px solid #FFB300;
    border-right: 2px solid #FFB300;
  }

  /* === Fade In === */
  .fade-in {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.8s ease forwards;
  }

  .fade-in:nth-child(1) { animation-delay: 0.1s; }
  .fade-in:nth-child(2) { animation-delay: 0.3s; }
  .fade-in:nth-child(3) { animation-delay: 0.5s; }

  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* === Responsive === */
  @media (max-width: 480px) {
    .logo-img { width: 110px; }
    .loader-container { width: 130px; height: 130px; }
    .percentage { font-size: 1.5em; }
    .waiting-text { font-size: 1.1em; }
    .progress-bar-container { width: 260px; }
    .logo-glow { width: 160px; height: 160px; }
    .logo-ring { width: 140px; height: 140px; }
    .logo-ring-2 { width: 165px; height: 165px; }
  }
</style>
</head>
<body>

  <!-- Background Layers -->
  <div class="bg-grid"></div>
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>
  <div class="bg-glow-3"></div>
  <canvas id="particles"></canvas>

  <!-- Corner Accents -->
  <div class="corner-accent tl"></div>
  <div class="corner-accent tr"></div>
  <div class="corner-accent bl"></div>
  <div class="corner-accent br"></div>
  <div class="bottom-line"></div>

  <!-- SVG Gradient Def -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FFD54F"/>
        <stop offset="50%" stop-color="#FFB300"/>
        <stop offset="100%" stop-color="#FF8F00"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- Main Content -->
  <div class="content-wrapper">

    <!-- Logo -->
    <div class="logo-container fade-in">
      <div class="logo-glow"></div>
      <div class="logo-ring"></div>
      <div class="logo-ring-2"></div>
      <img src="https://ik.imagekit.io/Jawara88/jawara88/DEPO138/DEPO138.png" alt="DEPO138" class="logo-img">
    </div>

    <!-- Loader -->
    <div class="loader-section fade-in">
      <div class="loader-container">
        <div class="outer-ring"></div>
        <div class="middle-ring"></div>
        <div class="inner-ring"></div>
        <svg class="progress-track" viewBox="0 0 112 112">
          <circle class="progress-fill" id="progressCircle" cx="56" cy="56" r="50"/>
        </svg>
        <div class="percentage" id="percentageText">0%</div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-bar-container">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="loading-label">Memproses</div>
      </div>
    </div>

    <!-- Text -->
    <div class="text-section fade-in">
      <div class="brand-name">DEPO138</div>
      <h1 class="waiting-text">Mohon Sabar Ya <span>Bossku</span></h1>
      <p class="redirect-text">Sedang dialihkan ke link <span class="highlight">GACOR</span> terpercaya tahun ini</p>
      <div class="shimmer-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

  </div>

<script>
  // === Percentage & Progress Animation ===
  const percentageElement = document.getElementById('percentageText');
  const progressBar = document.getElementById('progressBar');
  const progressCircle = document.getElementById('progressCircle');
  const circumference = 2 * Math.PI * 50; // r=50
  let count = 0;

  function updatePercentage() {
    percentageElement.textContent = `${count}%`;
    progressBar.style.width = `${count}%`;

    // SVG circle progress
    const offset = circumference - (count / 100) * circumference;
    progressCircle.style.strokeDashoffset = offset;

    count++;
    if (count <= 100) {
      // Variable speed - slower near end for suspense
      let delay = count < 70 ? 25 : (count < 90 ? 40 : 55);
      setTimeout(updatePercentage, delay);
    } else {
      setTimeout(function() {
        window.location.href = 'https://depo138.blog/register/5MK79R4P';
      }, 400);
    }
  }

  // Start after a brief pause for visual effect
  setTimeout(updatePercentage, 800);

  // === Particle System ===
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const PARTICLE_COUNT = 40;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  class Particle {
    constructor() {
      this.reset();
    }

    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 2 + 0.5;
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.speedY = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.4 + 0.1;
      this.fadeSpeed = Math.random() * 0.005 + 0.002;
      this.growing = Math.random() > 0.5;
      // Gold tones
      const colors = ['#FFB300', '#FFD54F', '#FF8F00', '#FFFFFF'];
      this.color = colors[Math.floor(Math.random() * colors.length)];
    }

    update() {
      this.x += this.speedX;
      this.y += this.speedY;

      if (this.growing) {
        this.opacity += this.fadeSpeed;
        if (this.opacity >= 0.5) this.growing = false;
      } else {
        this.opacity -= this.fadeSpeed;
        if (this.opacity <= 0.05) this.growing = true;
      }

      if (this.x < -10 || this.x > canvas.width + 10 || this.y < -10 || this.y > canvas.height + 10) {
        this.reset();
      }
    }

    draw() {
      ctx.save();
      ctx.globalAlpha = this.opacity;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();

      // Glow
      ctx.globalAlpha = this.opacity * 0.3;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // Initialize particles
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle());
  }

  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animateParticles);
  }

  animateParticles();
</script>

</body>
</html>
